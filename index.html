<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강남4구 아파트 실거래가 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sbux-green: #00704A;
            --sbux-green-light: #1e8c5e;
            --sbux-green-pale: #e8f5ef;
            --sbux-dark: #1E3932;
            --sbux-brown: #CBA258;
            --sbux-brown-light: #f0e6d0;
            --bg: #F9F6F0;
            --card: #ffffff;
            --text-primary: #1E3932;
            --text-secondary: #4a6b60;
            --text-muted: #9aafa8;
            --border: #e2d9c8;
            --shadow: 0 2px 16px rgba(30,57,50,0.08);
            --shadow-lg: 0 8px 32px rgba(30,57,50,0.14);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* 헤더 */
        .header {
            background: linear-gradient(135deg, var(--sbux-dark) 0%, #2d5c4f 100%);
            padding: 28px 32px 24px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header-left h1 {
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.5px;
            line-height: 1.3;
        }
        .header-left p {
            font-size: 13px;
            color: rgba(255,255,255,0.65);
            margin-top: 4px;
        }
        .header-right {
            font-size: 12px;
            color: rgba(255,255,255,0.75);
            background: rgba(255,255,255,0.12);
            padding: 8px 14px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .header-right span { color: #fff; font-weight: 600; }

        /* 메인 컨텐츠 */
        .main { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }

        /* KPI 카드 */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .kpi-card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .kpi-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
        }
        .kpi-card:nth-child(1)::before { background: var(--sbux-green); }
        .kpi-card:nth-child(2)::before { background: var(--sbux-brown); }
        .kpi-card:nth-child(3)::before { background: var(--sbux-dark); }
        .kpi-card:nth-child(4)::before { background: var(--sbux-green-light); }

        .kpi-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }
        .kpi-value {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1;
            margin-bottom: 4px;
        }
        .kpi-value small { font-size: 14px; font-weight: 600; }
        .kpi-sub { font-size: 11px; color: var(--text-muted); }
        .kpi-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 32px;
            opacity: 0.12;
        }

        /* 필터 영역 */
        .filter-section {
            background: var(--card);
            border-radius: 16px;
            padding: 20px 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }
        .filter-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        /* 구 버튼 */
        .district-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .district-btn {
            padding: 8px 18px;
            border-radius: 24px;
            border: 1.5px solid var(--border);
            background: #fff;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.18s;
            font-family: inherit;
        }
        .district-btn:hover {
            border-color: var(--sbux-green);
            color: var(--sbux-green);
            background: var(--sbux-green-pale);
        }
        .district-btn.active {
            background: var(--sbux-green);
            border-color: var(--sbux-green);
            color: #fff;
            box-shadow: 0 2px 8px rgba(0,112,74,0.3);
        }

        /* 검색 */
        .search-wrap {
            flex: 1;
            min-width: 180px;
            max-width: 280px;
            position: relative;
        }
        .search-wrap input {
            width: 100%;
            padding: 9px 14px 9px 36px;
            border: 1.5px solid var(--border);
            border-radius: 24px;
            font-size: 13px;
            font-family: inherit;
            color: var(--text-primary);
            background: var(--bg);
            outline: none;
            transition: border-color 0.18s;
        }
        .search-wrap input:focus { border-color: var(--sbux-green); background: #fff; }
        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
        }

        /* 컨텐츠 그리드 */
        .content-grid {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 20px;
            align-items: start;
        }

        /* 차트 카드 */
        .chart-card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .card-badge {
            font-size: 11px;
            font-weight: 600;
            color: var(--sbux-green);
            background: var(--sbux-green-pale);
            padding: 4px 10px;
            border-radius: 12px;
        }
        .chart-wrap {
            position: relative;
            height: 320px;
        }

        /* 테이블 카드 */
        .table-card {
            background: var(--card);
            border-radius: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .table-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .result-badge {
            font-size: 12px;
            font-weight: 700;
            color: var(--sbux-green);
            background: var(--sbux-green-pale);
            padding: 4px 12px;
            border-radius: 12px;
        }
        .table-scroll {
            overflow-y: auto;
            max-height: 380px;
        }
        .table-scroll::-webkit-scrollbar { width: 6px; }
        .table-scroll::-webkit-scrollbar-track { background: var(--bg); }
        .table-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        table { width: 100%; border-collapse: collapse; }
        thead th {
            padding: 10px 16px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            background: var(--bg);
            position: sticky;
            top: 0;
            text-align: left;
            white-space: nowrap;
        }
        thead th:last-child { text-align: right; }
        tbody tr {
            border-bottom: 1px solid #f0f5f2;
            transition: background 0.12s;
        }
        tbody tr:hover { background: var(--sbux-green-pale); }
        tbody td {
            padding: 12px 16px;
            font-size: 13px;
            color: var(--text-primary);
            white-space: nowrap;
        }
        .td-apt { font-weight: 600; max-width: 160px; overflow: hidden; text-overflow: ellipsis; }
        .td-gu {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 10px;
            background: var(--sbux-brown-light);
            color: var(--sbux-dark);
        }
        .td-price {
            font-weight: 800;
            color: var(--sbux-green);
            text-align: right;
            font-size: 14px;
        }
        .td-muted { color: var(--text-muted); font-size: 12px; }

        /* 로딩/빈 상태 */
        .empty-state {
            padding: 48px 24px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
        }

        /* 반응형 */
        @media (max-width: 1100px) {
            .content-grid { grid-template-columns: 1fr; }
            .chart-wrap { height: 260px; }
        }
        @media (max-width: 768px) {
            .main { padding: 16px; }
            .header { padding: 20px 16px; }
            .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .filter-section { padding: 16px; gap: 12px; }
            .kpi-value { font-size: 20px; }
        }
        @media (max-width: 480px) {
            .kpi-grid { grid-template-columns: 1fr 1fr; }
            .header-left h1 { font-size: 18px; }
        }
    </style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
    <div class="header-left">
        <h1>🏠 강남4구 아파트 실거래가 대시보드</h1>
        <p>강남구 · 서초구 · 송파구 · 성동구 실거래 데이터 분석</p>
    </div>
    <div class="header-right">
        🕐 마지막 업데이트: <span id="lastUpdated">로딩 중...</span>
    </div>
</div>

<div class="main">

    <!-- KPI 카드 -->
    <div class="kpi-grid">
        <div class="kpi-card">
            <div class="kpi-label">총 거래건수</div>
            <div class="kpi-value" id="kpi-count">-<small>건</small></div>
            <div class="kpi-sub" id="kpi-count-sub">전체 기간</div>
            <div class="kpi-icon">📊</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-label">평균 거래금액</div>
            <div class="kpi-value" id="kpi-avg">-<small>만원</small></div>
            <div class="kpi-sub" id="kpi-avg-sub">조회 기준</div>
            <div class="kpi-icon">📈</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-label">최고 거래금액</div>
            <div class="kpi-value" id="kpi-max">-<small>만원</small></div>
            <div class="kpi-sub" id="kpi-max-apt">-</div>
            <div class="kpi-icon">🏆</div>
        </div>
        <div class="kpi-card">
            <div class="kpi-label">최저 거래금액</div>
            <div class="kpi-value" id="kpi-min">-<small>만원</small></div>
            <div class="kpi-sub" id="kpi-min-apt">-</div>
            <div class="kpi-icon">💰</div>
        </div>
    </div>

    <!-- 필터 -->
    <div class="filter-section">
        <span class="filter-label">구 선택</span>
        <div class="district-buttons">
            <button class="district-btn active" data-gu="전체">전체</button>
            <button class="district-btn" data-gu="강남구">강남구</button>
            <button class="district-btn" data-gu="서초구">서초구</button>
            <button class="district-btn" data-gu="송파구">송파구</button>
            <button class="district-btn" data-gu="성동구">성동구</button>
        </div>
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="아파트명 검색...">
        </div>
    </div>

    <!-- 컨텐츠 -->
    <div class="content-grid">

        <!-- 차트 -->
        <div class="chart-card">
            <div class="card-header">
                <div class="card-title">아파트별 평균 거래금액 TOP 10</div>
                <span class="card-badge" id="chart-gu-badge">전체</span>
            </div>
            <div class="chart-wrap">
                <canvas id="priceChart"></canvas>
            </div>
        </div>

        <!-- 테이블 -->
        <div class="table-card">
            <div class="table-header">
                <div class="card-title">상세 거래 내역</div>
                <span class="result-badge" id="resultCount">총 0건</span>
            </div>
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>거래일자</th>
                            <th>구</th>
                            <th>아파트명</th>
                            <th>법정동</th>
                            <th>면적</th>
                            <th>층</th>
                            <th>거래금액(만원)</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="7" class="empty-state">데이터를 불러오는 중...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQL7go0jeILKDrLRwMzSsZBB9XF9Sm2sfLrbeiMyZUJR-3g4MWrQe6jYgaFm4jO-gSTnG9Y1HnoHPK1/pub?gid=0&single=true&output=csv';

    let allData = [];
    let myChart = null;
    let currentGu = '전체';

    function parseCSV(text) {
        let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;
        for (l of text) {
            if ('"' === l) { if (s && l === p) row[i] += l; s = !s; }
            else if (',' === l && s) l = row[++i] = '';
            else if ('\n' === l && s) { if ('\r' === p) row[i] = row[i].slice(0, -1); row = ret[++r] = ['']; i = 0; }
            else row[i] += l;
            p = l;
        }
        if (ret[ret.length - 1].length === 1 && ret[ret.length - 1][0] === '') ret.pop();
        return ret;
    }

    function processData(csvArray) {
        const headers = csvArray[0].map(h => h.trim());
        const data = [];
        for (let i = 1; i < csvArray.length; i++) {
            let obj = {};
            csvArray[i].forEach((val, idx) => { if (headers[idx]) obj[headers[idx]] = val.trim(); });

            const kDate = Object.keys(obj).find(k => k.includes('일자')) || '';
            const kGu = Object.keys(obj).find(k => k === '구') || '';
            const kApt = Object.keys(obj).find(k => k.includes('아파트')) || '';
            const kDong = Object.keys(obj).find(k => k.includes('법정동')) || '';
            const kArea = Object.keys(obj).find(k => k.includes('면적')) || '';
            const kFloor = Object.keys(obj).find(k => k.includes('층')) || '';
            const kPrice = Object.keys(obj).find(k => k.includes('금액')) || '';

            let price = parseInt((obj[kPrice] || '0').replace(/,/g, ''), 10);
            if (isNaN(price)) price = 0;

            let guStr = obj[kGu] || '';
            let cleanGu = '';
            if (guStr.includes('강남구')) cleanGu = '강남구';
            else if (guStr.includes('서초구')) cleanGu = '서초구';
            else if (guStr.includes('송파구')) cleanGu = '송파구';
            else if (guStr.includes('성동구')) cleanGu = '성동구';

            if (cleanGu && price > 0) {
                data.push({
                    date: obj[kDate] || '-',
                    gu: cleanGu,
                    apt: obj[kApt] || '-',
                    dong: obj[kDong] || '-',
                    area: obj[kArea] || '-',
                    floor: obj[kFloor] || '-',
                    price: price
                });
            }
        }
        return data;
    }

    async function loadData() {
        try {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            allData = processData(parseCSV(text));
            const now = new Date();
            document.getElementById('lastUpdated').innerText =
                `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            updateDashboard();
        } catch (e) {
            document.getElementById('tableBody').innerHTML = `<tr><td colspan="7" class="empty-state">⚠️ 데이터를 불러오지 못했습니다.</td></tr>`;
            document.getElementById('lastUpdated').innerText = '로드 실패';
        }
    }

    function updateDashboard() {
        const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
        let filtered = allData.filter(d => {
            const matchGu = currentGu === '전체' || d.gu === currentGu;
            const matchKeyword = d.apt.toLowerCase().includes(keyword) || d.dong.toLowerCase().includes(keyword);
            return matchGu && matchKeyword;
        });
        filtered.sort((a, b) => b.price - a.price);

        updateKPI(filtered);
        renderTable(filtered);
        renderChart(filtered);
        document.getElementById('chart-gu-badge').innerText = currentGu;
    }

    function updateKPI(data) {
        if (data.length === 0) {
            ['kpi-count','kpi-avg','kpi-max','kpi-min'].forEach(id => document.getElementById(id).innerHTML = '-');
            return;
        }
        const total = data.length;
        const avg = Math.round(data.reduce((s, d) => s + d.price, 0) / total);
        const maxItem = data[0];
        const minItem = data[data.length - 1];

        document.getElementById('kpi-count').innerHTML = `${total.toLocaleString()}<small>건</small>`;
        document.getElementById('kpi-count-sub').innerText = currentGu === '전체' ? '전체 4개 구' : currentGu;
        document.getElementById('kpi-avg').innerHTML = `${avg.toLocaleString()}<small>만원</small>`;
        document.getElementById('kpi-avg-sub').innerText = '평균 거래가';
        document.getElementById('kpi-max').innerHTML = `${maxItem.price.toLocaleString()}<small>만원</small>`;
        document.getElementById('kpi-max-apt').innerText = maxItem.apt;
        document.getElementById('kpi-min').innerHTML = `${minItem.price.toLocaleString()}<small>만원</small>`;
        document.getElementById('kpi-min-apt').innerText = minItem.apt;
    }

    function renderTable(data) {
        document.getElementById('resultCount').innerText = `총 ${data.length.toLocaleString()}건`;
        if (data.length === 0) {
            document.getElementById('tableBody').innerHTML = `<tr><td colspan="7" class="empty-state">조건에 맞는 거래 내역이 없습니다.</td></tr>`;
            return;
        }
        document.getElementById('tableBody').innerHTML = data.map(d => `
            <tr>
                <td class="td-muted">${d.date}</td>
                <td><span class="td-gu">${d.gu}</span></td>
                <td class="td-apt">${d.apt}</td>
                <td class="td-muted">${d.dong}</td>
                <td class="td-muted">${d.area}㎡</td>
                <td class="td-muted">${d.floor}층</td>
                <td class="td-price">${d.price.toLocaleString()}</td>
            </tr>
        `).join('');
    }

    function renderChart(data) {
        // 아파트별 평균 계산
        const aptMap = {};
        data.forEach(d => {
            if (!aptMap[d.apt]) aptMap[d.apt] = { sum: 0, count: 0 };
            aptMap[d.apt].sum += d.price;
            aptMap[d.apt].count++;
        });

        const sorted = Object.entries(aptMap)
            .map(([apt, v]) => ({ apt, avg: Math.round(v.sum / v.count) }))
            .sort((a, b) => b.avg - a.avg)
            .slice(0, 10);

        const labels = sorted.map(d => d.apt.length > 10 ? d.apt.slice(0, 10) + '…' : d.apt);
        const values = sorted.map(d => d.avg);

        const ctx = document.getElementById('priceChart').getContext('2d');
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels,
                datasets: [{
                    label: '평균 거래금액(만원)',
                    data: values,
                    backgroundColor: values.map((_, i) =>
                        i === 0 ? 'rgba(0,112,74,0.95)' :
                        i === 1 ? 'rgba(0,112,74,0.8)' :
                        i === 2 ? 'rgba(0,112,74,0.65)' :
                        i === 3 ? 'rgba(30,57,50,0.55)' :
                        'rgba(0,112,74,0.4)'
                    ),
                    borderRadius: 6,
                    borderSkipped: false,
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: ctx => `${ctx.raw.toLocaleString()} 만원`
                        }
                    }
                },
                scales: {
                    x: {
                        beginAtZero: true,
                        grid: { color: '#f0f5f2' },
                        ticks: {
                            font: { size: 11 },
                            callback: v => (v / 10000).toFixed(0) + '억'
                        }
                    },
                    y: {
                        grid: { display: false },
                        ticks: { font: { size: 11, weight: '600' }, color: '#1E3932' }
                    }
                }
            }
        });
    }

    // 구 버튼 이벤트
    document.querySelectorAll('.district-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.district-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentGu = btn.dataset.gu;
            updateDashboard();
        });
    });

    document.getElementById('searchInput').addEventListener('input', updateDashboard);

    loadData();
</script>
</body>
</html>
