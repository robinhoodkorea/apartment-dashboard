<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강남4구 아파트 실거래가 대시보드</title>
    
    <!-- Tailwind CSS (디자인 프레임워크) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js (차트 라이브러리) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- 폰트: 맑고 모던한 Pretendard 적용 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f8fafc;
        }
        /* 테이블 스크롤바 커스텀 */
        .table-wrapper::-webkit-scrollbar {
            height: 8px;
            width: 8px;
        }
        .table-wrapper::-webkit-scrollbar-track {
            background: #f1f5f9; 
            border-radius: 4px;
        }
        .table-wrapper::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .table-wrapper::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="text-slate-800 antialiased p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- 헤더 영역 -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-slate-900 tracking-tight">강남4구 아파트 실거래가 대시보드</h1>
                <p class="text-sm text-slate-500 mt-2">강남구, 서초구, 송파구, 성동구의 실거래 데이터를 분석합니다.</p>
            </div>
            <div class="text-sm font-medium text-slate-500 bg-slate-50 px-4 py-2 rounded-lg flex items-center gap-2">
                <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                마지막 업데이트: <span id="lastUpdated" class="text-slate-700 font-semibold">로딩 중...</span>
            </div>
        </header>

        <!-- 필터 컨트롤 영역 -->
        <section class="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row gap-4">
            <div class="flex-1">
                <label for="districtFilter" class="block text-sm font-semibold text-slate-700 mb-2">구 선택</label>
                <select id="districtFilter" class="w-full bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-3 transition-colors">
                    <option value="전체">전체 (강남/서초/송파/성동)</option>
                    <option value="강남구">강남구</option>
                    <option value="서초구">서초구</option>
                    <option value="송파구">송파구</option>
                    <option value="성동구">성동구</option>
                </select>
            </div>
            <div class="flex-[2]">
                <label for="searchInput" class="block text-sm font-semibold text-slate-700 mb-2">아파트명 검색</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                        <svg class="w-4 h-4 text-slate-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z"/>
                        </svg>
                    </div>
                    <input type="text" id="searchInput" class="block w-full p-3 pl-10 text-sm text-slate-900 border border-slate-200 rounded-xl bg-slate-50 focus:ring-blue-500 focus:border-blue-500 transition-colors" placeholder="예: 자이, 래미안, 푸르지오...">
                </div>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- 차트 영역 -->
            <section class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col">
                <h2 class="text-lg font-bold text-slate-800 mb-4">구별 평균 거래금액 (조회 결과)</h2>
                <div class="relative flex-1 w-full min-h-[300px]">
                    <canvas id="priceChart"></canvas>
                </div>
            </section>

            <!-- 테이블 영역 -->
            <section class="lg:col-span-2 bg-white p-0 rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex flex-col">
                <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                    <h2 class="text-lg font-bold text-slate-800">상세 거래 내역</h2>
                    <span id="resultCount" class="text-sm font-medium text-blue-600 bg-blue-50 px-3 py-1 rounded-full">총 0건</span>
                </div>
                <div class="table-wrapper overflow-x-auto flex-1 h-[400px] lg:h-[500px] overflow-y-auto">
                    <table class="w-full text-sm text-left text-slate-600 min-w-[700px]">
                        <thead class="text-xs text-slate-500 uppercase bg-slate-50 sticky top-0 shadow-sm">
                            <tr>
                                <th scope="col" class="px-6 py-4 font-semibold">거래일자</th>
                                <th scope="col" class="px-6 py-4 font-semibold">구</th>
                                <th scope="col" class="px-6 py-4 font-semibold">아파트명</th>
                                <th scope="col" class="px-6 py-4 font-semibold">법정동</th>
                                <th scope="col" class="px-6 py-4 font-semibold text-right">전용면적</th>
                                <th scope="col" class="px-6 py-4 font-semibold text-center">층</th>
                                <th scope="col" class="px-6 py-4 font-bold text-slate-900 text-right">거래금액(만원)</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-100">
                            <!-- 데이터가 동적으로 삽입됩니다. -->
                            <tr><td colspan="7" class="px-6 py-8 text-center text-slate-400">데이터를 불러오는 중입니다...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQL7go0jeILKDrLRwMzSsZBB9XF9Sm2sfLrbeiMyZUJR-3g4MWrQe6jYgaFm4jO-gSTnG9Y1HnoHPK1/pub?gid=0&single=true&output=csv';
        
        let allData = [];
        let myChart = null;

        // 경량 CSV 파서 (따옴표 내 쉼표 무시 처리)
        function parseCSV(text) {
            let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;
            for (l of text) {
                if ('"' === l) {
                    if (s && l === p) row[i] += l;
                    s = !s;
                } else if (',' === l && s) l = row[++i] = '';
                else if ('\n' === l && s) {
                    if ('\r' === p) row[i] = row[i].slice(0, -1);
                    row = ret[++r] = ['']; i = 0;
                } else row[i] += l;
                p = l;
            }
            if (ret[ret.length - 1].length === 1 && ret[ret.length - 1][0] === '') ret.pop();
            return ret;
        }

        // CSV 데이터를 다루기 쉬운 객체 배열로 변환
        function processData(csvArray) {
            const headers = csvArray[0].map(h => h.trim());
            const data = [];
            
            for(let i = 1; i < csvArray.length; i++) {
                let obj = {};
                csvArray[i].forEach((val, idx) => {
                    if(headers[idx]) obj[headers[idx]] = val.trim();
                });

                // 유연한 키 매핑 (CSV 컬럼명이 조금 달라도 작동하도록)
                const kDate = Object.keys(obj).find(k => k.includes('일자') || k.includes('계약')) || '';
                const kGu = Object.keys(obj).find(k => k.includes('구') || k.includes('시군구')) || '';
                const kApt = Object.keys(obj).find(k => k.includes('아파트') || k.includes('단지')) || '';
                const kDong = Object.keys(obj).find(k => k.includes('법정동') || k.includes('동')) || '';
                const kArea = Object.keys(obj).find(k => k.includes('면적')) || '';
                const kFloor = Object.keys(obj).find(k => k.includes('층')) || '';
                const kPrice = Object.keys(obj).find(k => k.includes('금액')) || '';

                // 숫자형으로 변환 및 정제
                let priceStr = obj[kPrice] || '0';
                let price = parseInt(priceStr.replace(/,/g, ''), 10);
                if(isNaN(price)) price = 0;

                let guStr = obj[kGu] || '';
                let cleanGu = '';
                if(guStr.includes('강남구')) cleanGu = '강남구';
                else if(guStr.includes('서초구')) cleanGu = '서초구';
                else if(guStr.includes('송파구')) cleanGu = '송파구';
                else if(guStr.includes('성동구')) cleanGu = '성동구';

                if (cleanGu && price > 0) {
                    data.push({
                        date: obj[kDate] || '-',
                        gu: cleanGu,
                        apt: obj[kApt] || '-',
                        dong: obj[kDong] || '-',
                        area: obj[kArea] || '-',
                        floor: obj[kFloor] || '-',
                        price: price
                    });
                }
            }
            return data;
        }

        // 초기 데이터 로드
        async function loadData() {
            try {
                const response = await fetch(CSV_URL);
                const csvText = await response.text();
                const csvArray = parseCSV(csvText);
                
                allData = processData(csvArray);
                
                // 업데이트 시간 표시
                const now = new Date();
                document.getElementById('lastUpdated').innerText = 
                    `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
                
                updateDashboard();
            } catch (error) {
                console.error("Data loading failed:", error);
                document.getElementById('tableBody').innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-red-500 font-medium">데이터를 불러오는데 실패했습니다. URL을 확인해주세요.</td></tr>`;
                document.getElementById('lastUpdated').innerText = "로드 실패";
            }
        }

        // 화면 갱신 (필터링 -> 차트/표 업데이트)
        function updateDashboard() {
            const district = document.getElementById('districtFilter').value;
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();

            // 데이터 필터링
            let filtered = allData.filter(item => {
                const matchDistrict = district === '전체' || item.gu === district;
                const matchKeyword = item.apt.toLowerCase().includes(keyword) || item.dong.toLowerCase().includes(keyword);
                return matchDistrict && matchKeyword;
            });

            // 가격 기준 내림차순 정렬
            filtered.sort((a, b) => b.price - a.price);

            renderTable(filtered);
            renderChart(filtered);
        }

        // 표 렌더링
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            document.getElementById('resultCount').innerText = `총 ${data.length.toLocaleString()}건`;

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-slate-500 bg-slate-50">조건에 맞는 거래 내역이 없습니다.</td></tr>`;
                return;
            }

            tbody.innerHTML = data.map(item => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-4 whitespace-nowrap">${item.date}</td>
                    <td class="px-6 py-4 whitespace-nowrap"><span class="bg-slate-100 text-slate-700 px-2 py-1 rounded text-xs font-semibold">${item.gu}</span></td>
                    <td class="px-6 py-4 font-medium text-slate-900">${item.apt}</td>
                    <td class="px-6 py-4 text-slate-500">${item.dong}</td>
                    <td class="px-6 py-4 text-right">${item.area}㎡</td>
                    <td class="px-6 py-4 text-center">${item.floor}</td>
                    <td class="px-6 py-4 text-right font-bold text-blue-600">${item.price.toLocaleString()}</td>
                </tr>
            `).join('');
        }

        // 차트 렌더링
        function renderChart(data) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            const targetDistricts = ['강남구', '서초구', '송파구', '성동구'];
            
            // 구별 평균 가격 계산
            const avgPrices = targetDistricts.map(gu => {
                const guData = data.filter(d => d.gu === gu);
                if (guData.length === 0) return 0;
                const sum = guData.reduce((acc, curr) => acc + curr.price, 0);
                return Math.round(sum / guData.length);
            });

            if (myChart) {
                myChart.destroy();
            }

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: targetDistricts,
                    datasets: [{
                        label: '평균 거래금액 (만원)',
                        data: avgPrices,
                        backgroundColor: [
                            'rgba(59, 130, 246, 0.7)',  // Blue
                            'rgba(16, 185, 129, 0.7)',  // Green
                            'rgba(245, 158, 11, 0.7)',  // Yellow
                            'rgba(139, 92, 246, 0.7)'   // Purple
                        ],
                        borderWidth: 0,
                        borderRadius: 6,
                        barThickness: 30
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (context) => context.raw === 0 ? '데이터 없음' : `${context.raw.toLocaleString()} 만원`
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: '#f1f5f9', drawBorder: false },
                            ticks: {
                                callback: (value) => value.toLocaleString()
                            }
                        },
                        x: {
                            grid: { display: false, drawBorder: false }
                        }
                    }
                }
            });
        }

        // 이벤트 리스너 등록
        document.getElementById('districtFilter').addEventListener('change', updateDashboard);
        document.getElementById('searchInput').addEventListener('input', updateDashboard);

        // 초기 실행
        loadData();
    </script>
</body>
</html>
